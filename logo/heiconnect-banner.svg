<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Left: Title and subtitle -->
  <text x="50" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#e0e0e0" letter-spacing="3">
    <tspan fill="#ef5350">Hei</tspan><tspan fill="#e0e0e0">Connect</tspan>
  </text>
  <text x="50" y="125" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#90a4ae">
    Weighted Connectivity Augmentation
  </text>
  <text x="50" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#607d8b">
    Heuristic, Local Search, ILP-based Exact
  </text>

  <!-- Badge: Part of KaHIP -->
  <rect x="50" y="180" width="130" height="26" rx="13" fill="#263238"/>
  <text x="115" y="197" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#80cbc4" text-anchor="middle">Part of KaHIP</text>

  <!-- Right side: Graph with augmentation links -->

  <!-- Original graph nodes -->
  <circle cx="480" cy="65" r="10" fill="#42a5f5"/>
  <circle cx="540" cy="130" r="10" fill="#42a5f5"/>
  <circle cx="470" cy="190" r="10" fill="#42a5f5"/>
  <circle cx="620" cy="60" r="10" fill="#42a5f5"/>
  <circle cx="690" cy="120" r="10" fill="#42a5f5"/>
  <circle cx="680" cy="200" r="10" fill="#42a5f5"/>
  <circle cx="760" cy="70" r="10" fill="#42a5f5"/>
  <circle cx="770" cy="180" r="10" fill="#42a5f5"/>

  <!-- Original edges (solid, blue-gray) -->
  <line x1="488" y1="70" x2="534" y2="125" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="476" y1="73" x2="466" y2="183" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="546" y1="136" x2="474" y2="184" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="628" y1="65" x2="684" y2="115" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="696" y1="126" x2="684" y2="194" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="626" y1="66" x2="754" y2="68" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="766" y1="78" x2="772" y2="172" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>
  <line x1="686" y1="206" x2="764" y2="184" stroke="#42a5f5" stroke-width="2" opacity="0.45"/>

  <!-- Minimum cut dashed line (separating left 3 from right 5) -->
  <path d="M 575 30 Q 580 130, 570 235" stroke="#546e7a" stroke-width="1.5" fill="none" stroke-dasharray="6,5" opacity="0.5"/>

  <!-- Augmentation links (green dashed, crossing the cut) -->
  <line x1="488" y1="60" x2="614" y2="58" stroke="#66bb6a" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.85"/>
  <line x1="546" y1="125" x2="684" y2="118" stroke="#66bb6a" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.85"/>
  <line x1="476" y1="194" x2="674" y2="202" stroke="#66bb6a" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.85"/>

  <!-- Plus icons on augmentation links -->
  <circle cx="550" cy="58" r="8" fill="#263238" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="550" y="63" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#66bb6a" text-anchor="middle">+</text>
  <circle cx="615" cy="120" r="8" fill="#263238" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="615" y="125" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#66bb6a" text-anchor="middle">+</text>
  <circle cx="575" cy="199" r="8" fill="#263238" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="575" y="204" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#66bb6a" text-anchor="middle">+</text>

  <!-- Legend -->
  <line x1="810" y1="85" x2="840" y2="85" stroke="#42a5f5" stroke-width="2.5"/>
  <text x="848" y="89" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">edges</text>
  <line x1="810" y1="110" x2="840" y2="110" stroke="#66bb6a" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="848" y="114" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">links</text>
  <line x1="810" y1="135" x2="840" y2="135" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="848" y="139" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">cut</text>

  <!-- Bottom text -->
  <text x="620" y="248" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#546e7a" text-anchor="middle">
    weighted connectivity augmentation algorithms
  </text>
</svg>
